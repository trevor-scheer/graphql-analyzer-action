name: Test
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Unit (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - run: bats __tests__/unit

  integration-clean:
    name: Integration — clean fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run action against clean fixture
        id: run
        uses: ./
        with:
          working-directory: __tests__/fixtures/clean
      - name: Assert outputs
        run: |
          test "${{ steps.run.outputs.errors }}" = "0"
          test "${{ steps.run.outputs.warnings }}" = "0"

  integration-errors:
    name: Integration — errors fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run action (must fail)
        id: run
        uses: ./
        continue-on-error: true
        with:
          working-directory: __tests__/fixtures/errors
      - name: Assert non-zero exit and errors >= 1
        run: |
          test "${{ steps.run.outcome }}" = "failure"
          test "${{ steps.run.outputs.errors }}" -ge 1

  integration-annotate:
    name: Integration — annotation output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Drive scripts/run.sh directly so we can capture stdout. The composite
      # action sends ::error:: lines to GitHub at runtime; capturing them
      # in-job from the action's own step is not reliable, so we assert
      # against the script's stdout instead.
      - name: Install released CLI for the script run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pick the latest cli release.
          tag=$(gh release list --repo trevor-scheer/graphql-analyzer --limit 50 --json tagName \
                 | jq -r '[.[] | select(.tagName | startswith("graphql-analyzer-cli/v"))] | first | .tagName')
          gh release download "$tag" \
            --repo trevor-scheer/graphql-analyzer \
            --pattern 'graphql-cli-x86_64-unknown-linux-gnu.tar.xz' \
            --dir "$RUNNER_TEMP"
          tar -xJf "$RUNNER_TEMP/graphql-cli-x86_64-unknown-linux-gnu.tar.xz" \
            -C "$RUNNER_TEMP"
          chmod +x "$RUNNER_TEMP/graphql"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Run scripts/run.sh, capture stdout, and assert annotations + step summary
        env:
          INPUT_COMMAND: check
          INPUT_ANNOTATE: 'true'
          ACTION_PATH: ${{ github.workspace }}
          # GITHUB_STEP_SUMMARY is managed per-step by the runner; we let
          # run.sh write to it and inspect it after.
        working-directory: __tests__/fixtures/errors
        run: |
          set +e
          "$GITHUB_WORKSPACE/scripts/run.sh" > /tmp/run-stdout 2>&1
          ec=$?
          set -e
          test "$ec" -ne 0

          # Annotation assertion: the path is relative to $GITHUB_WORKSPACE
          # (repo root), not the working-directory, because annotate.sh
          # strips $GITHUB_WORKSPACE/.
          grep -F '::error file=__tests__/fixtures/errors/src/query.graphql' /tmp/run-stdout
          grep -F 'doesNotExist' /tmp/run-stdout

          # Step-summary assertion: read from the runner's per-step file.
          grep -q '## GraphQL Analyzer' "$GITHUB_STEP_SUMMARY"
          grep -q '1 errors' "$GITHUB_STEP_SUMMARY"

  integration-sarif:
    name: Integration — SARIF output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        id: run
        continue-on-error: true
        with:
          working-directory: __tests__/fixtures/errors
          sarif: true
      - name: SARIF file exists and parses as v2.1.0
        working-directory: __tests__/fixtures/errors
        run: |
          file="${{ steps.run.outputs.sarif-file }}"
          test -n "$file"
          test -s "$file"
          jq -e '.version == "2.1.0" and (.runs | length > 0)' "$file"
          # The CLI emits %SRCROOT%-relative URIs; verify the broken file
          # surfaces.
          jq -e '.runs[0].results[] | select(.locations[0].physicalLocation.artifactLocation.uri | endswith("query.graphql"))' "$file"

  integration-comment:
    name: Integration — PR summary comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        continue-on-error: true
        with:
          working-directory: __tests__/fixtures/errors
          comment: true
      - name: Assert comment exists with marker
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view "${{ github.event.pull_request.number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --json comments \
            --jq '.comments[].body' \
            | grep -F '<!-- graphql-analyzer-action -->'
      - name: Re-run action; comment must be UPDATED, not duplicated
        uses: ./
        continue-on-error: true
        with:
          working-directory: __tests__/fixtures/errors
          comment: true
      - name: Assert exactly one comment with marker
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --json comments \
            --jq '[.comments[] | select(.body | contains("<!-- graphql-analyzer-action -->"))] | length')
          test "$count" -eq 1
